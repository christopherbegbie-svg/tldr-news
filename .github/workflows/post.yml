name: TLDR Post

concurrency:
  group: tldr-post
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'    # 00:00 UTC — 8pm EST / US prime time
    - cron: '0 1 * * *'    # 01:00 UTC — 9pm EST / late US evening
    - cron: '0 4 * * *'    # 04:00 UTC — midnight EST / 5am BST
    - cron: '0 6 * * *'    # 06:00 UTC — 7am BST / early UK
    - cron: '0 7 * * *'    # 07:00 UTC — 8am BST / UK morning commute
    - cron: '0 8 * * *'    # 08:00 UTC — 9am BST / UK morning peak
    - cron: '0 9 * * *'    # 09:00 UTC — 5am EST / early US breaking news
    - cron: '0 11 * * *'   # 11:00 UTC — 7am EST / US morning
    - cron: '0 12 * * *'   # 12:00 UTC — 8am EST / US morning peak
    - cron: '0 14 * * *'   # 14:00 UTC — 10am EST / US mid-morning
    - cron: '0 16 * * *'   # 16:00 UTC — 12pm EST / US lunch peak
    - cron: '0 17 * * *'   # 17:00 UTC — 1pm EST / US afternoon
    - cron: '0 19 * * *'   # 19:00 UTC — 3pm EST / US afternoon
    - cron: '0 20 * * *'   # 20:00 UTC — 4pm EST / US late afternoon
    - cron: '0 21 * * *'   # 21:00 UTC — 5pm EST / US end-of-day peak
    - cron: '0 22 * * *'   # 22:00 UTC — 6pm EST / US prime time
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/
          key: tldr-db-${{ github.run_id }}
          restore-keys: tldr-db-

      - name: Run posting cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ADSENSE_PUBLISHER_ID: ${{ secrets.ADSENSE_PUBLISHER_ID }}
        run: python main.py --post-now

      - name: Publish website
        run: |
          git config user.name "TLDR Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || (git commit -m "auto: publish story [skip ci]" && git push)
