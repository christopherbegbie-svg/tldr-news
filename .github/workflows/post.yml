name: TLDR Post

on:
  schedule:
    - cron: '0 0 * * *'    # 00:00 UTC — 7pm EST
    - cron: '0 2 * * *'    # 02:00 UTC — 9pm EST
    - cron: '0 4 * * *'    # 04:00 UTC — 11pm EST
    - cron: '0 6 * * *'    # 06:00 UTC — 1am EST
    - cron: '0 8 * * *'    # 08:00 UTC — 3am EST
    - cron: '0 10 * * *'   # 10:00 UTC — 5am EST
    - cron: '0 12 * * *'   # 12:00 UTC — 7am EST
    - cron: '0 14 * * *'   # 14:00 UTC — 9am EST
    - cron: '0 16 * * *'   # 16:00 UTC — 11am EST
    - cron: '0 18 * * *'   # 18:00 UTC — 1pm EST
    - cron: '0 20 * * *'   # 20:00 UTC — 3pm EST
    - cron: '0 22 * * *'   # 22:00 UTC — 5pm EST
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/
          key: tldr-db-${{ github.run_id }}
          restore-keys: tldr-db-

      - name: Run posting cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python main.py --post-now
